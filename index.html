  <style>
    /* 原有样式保持不变 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    .chat-container {
      width: 100%;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .chat-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      pointer-events: none;
      opacity: 1;
      transition: background-image 0.4s ease;
    }

    .chat-header, .chat-messages, .chat-input-area, .modal-overlay {
      position: relative;
      z-index: 2;
    }

    /* 头部浅金色 */
    .chat-header {
      padding: 14px 20px 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #faf3e6;
      border-bottom: 1px solid #e7d5b5;
    }

    .partner-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: #f3e3ce;
      border: 1.5px solid #e7cfaa;
    }

    .partner-name {
      font-weight: 540;
      font-size: 1.1rem;
      color: #4d3822;
      background: rgba(250,240,220,0.7);
      padding: 2px 8px;
      border-radius: 14px;
    }

    .edit-note {
      font-size: 0.7rem;
      color: #b2926a;
      cursor: pointer;
      text-decoration: underline;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      background: rgba(245,230,200,0.8);
      border: none;
      height: 38px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      color: #6b4f32;
      padding: 0 16px;
      font-weight: 500;
    }

    .chat-messages {
      flex: 1;
      padding: 16px 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .message-row.sent {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      background: #f0debf;
      flex-shrink: 0;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.75rem;
      color: #a09080;
      font-style: italic;
      animation: fadeInOut 1.5s infinite;
    }

    .typing-dots {
      display: flex;
      gap: 3px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c9a87c;
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .bubble {
      display: inline-block;
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.45;
      color: #1e1e1e;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(200, 160, 100, 0.35);
      box-shadow: 0 2px 6px rgba(160, 120, 40, 0.05);
      word-break: break-word;
      overflow-wrap: break-word;
      width: fit-content;
      position: relative;
      white-space: normal;
    }

    .bubble.single-line {
      white-space: nowrap;
      word-break: keep-all;
    }

    .sent .bubble {
      background: rgba(255, 245, 220, 0.8);
      border: 1px solid rgba(200, 170, 100, 0.35);
    }

    .received .bubble {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(200, 180, 140, 0.35);
    }

    .sticker-bubble {
      background: transparent !important;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none !important;
      box-shadow: none;
      padding: 2px 0;
      display: block;
      max-width: 120px;
    }

    .sticker-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    .message-time {
      font-size: 0.5rem;
      color: #a09080;
      margin-top: 2px;
      padding: 0 4px;
      display: block;
    }

    .chat-input-area {
      padding: 10px 18px 16px 18px;
      background: #faf7f0;
      border-top: 1px solid #e7d5b5;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .emoji-toggle-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #8b6f4b;
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(240,225,190,0.7);
      flex-shrink: 0;
    }

    .message-input {
      flex: 1;
      background: #fffdf9;
      border: 1px solid #ddc7a2;
      border-radius: 28px;
      padding: 12px 18px;
      font-size: 0.95rem;
      outline: none;
    }

    .send-btn {
      background: #e7cfaa;
      border: none;
      width: 46px;
      height: 46px;
      border-radius: 30px;
      cursor: pointer;
      color: #4e3922;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal-dialog {
      background: rgba(255,250,240,0.98);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      padding: 24px;
      width: 85%;
      max-width: 400px;
      max-height: 70vh;
      box-shadow: 0 25px 50px rgba(130,90,30,0.3);
      border: 1px solid #ddc29b;
      display: flex;
      flex-direction: column;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-header h3 { color: #5e4328; font-size: 1.2rem; }

    .close-modal-btn {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #8b6f4b;
      line-height: 1;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-height: 45vh;
      padding: 4px 0;
    }

    .modal-item {
      background: #faf3e6;
      border-radius: 16px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .modal-item img { width: 40px; height: 40px; object-fit: contain; border-radius: 8px; }

    .delete-item-btn {
      background: none;
      border: none;
      color: #c2925a;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 0 4px;
    }

    .modal-footer {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .modal-footer input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid #ddc7a2;
      background: #fffdf9;
      outline: none;
    }

    .btn {
      background: #e7cfaa;
      border: none;
      border-radius: 20px;
      padding: 10px 18px;
      cursor: pointer;
      color: #4e3922;
      font-weight: 500;
      transition: 0.2s;
    }
    .btn:hover { background: #dbb57c; }
    .btn-outline { background: #f0dec6; }

    .avatar-upload-preview {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      background: #f3e3ce;
    }

    .settings-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: rgba(255, 250, 240, 0.98);
      backdrop-filter: blur(30px);
      z-index: 40;
      transform: translateY(-100%);
      transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex;
      flex-direction: column;
      border-bottom: 2px solid #ddc29b;
      box-shadow: 0 20px 35px rgba(150,110,40,0.25);
      overflow-y: auto;
      padding: 20px;
    }

    .settings-overlay.active { transform: translateY(0); }

    .card-trigger-btn {
      flex: 1;
      background: #faf3e6;
      border: 1px solid #ddc29b;
      border-radius: 20px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #5e4328;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      margin: 4px;
    }
    .card-trigger-btn:hover { background: #f0e3cc; }

    .speed-slider-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px 0;
    }

    .speed-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #faf3e6;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .speed-option:hover { background: #f0e3cc; }

    .speed-option.selected {
      background: #e7cfaa;
      font-weight: 600;
    }

    .speed-radio {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #c9a87c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .speed-option.selected .speed-radio::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6b4f32;
    }

    button { cursor: pointer; border: none; }

    /* PWA安装提示样式 */
    .install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #faf3e6;
      border: 2px solid #ddc29b;
      border-radius: 20px;
      padding: 12px 20px;
      z-index: 200;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(150,110,40,0.3);
      font-size: 0.9rem;
      color: #5e4328;
    }

    .install-prompt.show { display: flex; }

    .install-btn {
      background: #e7cfaa;
      border: none;
      border-radius: 16px;
      padding: 8px 16px;
      color: #4e3922;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat-container" id="chatContainer">

      <button class="close-modal-btn" id="closeSettingsBtn" style="align-self:flex-end;">✕</button>
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input type="text" id="nicknameInput" placeholder="备注名" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddc7a2;">

        <img id="myAvatarPreview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23c9a87c'/%3E%3Ccircle cx='50' cy='38' r='16' fill='%23fef5e7'/%3E%3Cellipse cx='50' cy='75' rx='28' ry='18' fill='%23fef5e7'/%3E%3C/svg%3E" style="width:40px;height:40px;border-radius:50%;">
        <button id="myAvatarBtn" class="btn-outline btn">更换</button>

        <button id="partnerAvatarBtn" class="btn-outline btn">更换</button>

    <div class="modal-overlay" id="modalOverlay">

    <!-- PWA安装提示 -->
    <div class="install-prompt" id="installPrompt">
      <span>📱 添加到主屏幕</span>
      <button class="install-btn" id="installBtn">安装</button>
      <button style="background:none; border:none; font-size:1.2rem; cursor:pointer;" onclick="document.getElementById('installPrompt').classList.remove('show')">✕</button>
    </div>

    <input type="file" accept="image/*" id="hiddenFileInput" style="display:none;">
  </div>

  <script>
    // ==================== PWA功能 ====================
    
    // 注册Service Worker（离线缓存）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // 创建内联Service Worker
        const swCode = `
          const CACHE_NAME = 'zika-chat-v1';
          const urlsToCache = [
            '/',
            'index.html'
          ];

          self.addEventListener('install', event => {
            event.waitUntil(
              caches.open(CACHE_NAME)
                .then(cache => cache.addAll(urlsToCache))
            );
          });

          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request)
                .then(response => response || fetch(event.request))
            );
          });

          self.addEventListener('activate', event => {
            event.waitUntil(
              caches.keys().then(cacheNames => {
                return Promise.all(
                  cacheNames.map(cacheName => {
                    if (cacheName !== CACHE_NAME) {
                      return caches.delete(cacheName);
                    }
                  })
                );
              })
            );
          });
        `;

        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        
        navigator.serviceWorker.register(swUrl)
          .then(registration => {
            console.log('✅ Service Worker 注册成功');
          })
          .catch(error => {
            console.log('❌ Service Worker 注册失败:', error);
          });
      });
    }

    // PWA安装提示
    let deferredPrompt;
    const installPrompt = document.getElementById('installPrompt');
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // 显示安装提示
      setTimeout(() => {
        installPrompt.classList.add('show');
      }, 3000);
    });

    installBtn.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('用户接受了安装');
          }
          deferredPrompt = null;
          installPrompt.classList.remove('show');
        });
      }
    });

    // 检测是否已安装
    window.addEventListener('appinstalled', () => {
      console.log('✅ 应用已安装');
      installPrompt.classList.remove('show');
    });

    // 如果是独立模式（已安装），隐藏安装提示
    if (window.matchMedia('(display-mode: standalone)').matches) {
      console.log('📱 正在以APP模式运行');
    }

    // ==================== 原有聊天功能 ====================
    
    (function() {
      const currentUser = 'me', partnerUser = 'partner';
      let myAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23c9a87c'/%3E%3Ccircle cx='50' cy='38' r='16' fill='%23fef5e7'/%3E%3Cellipse cx='50' cy='75' rx='28' ry='18' fill='%23fef5e7'/%3E%3C/svg%3E";
      let partnerAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23dbbc7c'/%3E%3Ccircle cx='50' cy='38' r='16' fill='%23f7e9d0'/%3E%3Cellipse cx='50' cy='75' rx='28' ry='18' fill='%23f7e9d0'/%3E%3C/svg%3E";
      let partnerName = "浅语";
      let chatBgUrl = "";
      let textCards = ["嗯，我在听", "只有我们", "私密空间", "继续说吧", "✨"];
      let stickerCards = [];
      let stickerPackCards = [];
      let messages = [];
      let isTyping = false;
      
      const speedOptions = [
        { label: '5秒', value: 5000 },
        { label: '10秒', value: 10000 },
        { label: '20秒', value: 20000 },
        { label: '30秒', value: 30000 },
        { label: '1分钟', value: 60000 },
        { label: '2分钟', value: 120000 }
      ];
      let replySpeed = 3000;

      function loadData() {
        try {
          const saved = localStorage.getItem('chatAppData');
          if (saved) {
            const data = JSON.parse(saved);
            myAvatar = data.myAvatar || myAvatar;
            partnerAvatar = data.partnerAvatar || partnerAvatar;
            partnerName = data.partnerName || partnerName;
            chatBgUrl = data.chatBgUrl || chatBgUrl;
            textCards = data.textCards || textCards;
            stickerCards = data.stickerCards || stickerCards;
            stickerPackCards = data.stickerPackCards || stickerPackCards;
            messages = data.messages || messages;
            replySpeed = data.replySpeed || replySpeed;
          }
        } catch(e) {}
      }

      function saveData() {
        try {
          localStorage.setItem('chatAppData', JSON.stringify({
            myAvatar, partnerAvatar, partnerName, chatBgUrl,
            textCards, stickerCards, stickerPackCards, messages, replySpeed
          }));
        } catch(e) {}
      }

      const chatMessages = document.getElementById('chatMessages');
      const messageInput = document.getElementById('messageInput');
      const sendButton = document.getElementById('sendButton');
      const partnerDisplayName = document.getElementById('partnerDisplayName');
      const partnerAvatarImg = document.getElementById('partnerAvatarImg');
      const chatBackground = document.getElementById('chatBackground');
      const emojiToggleBtn = document.getElementById('emojiToggleBtn');
      const settingsOverlay = document.getElementById('settingsOverlay');
      const settingsToggle = document.getElementById('settingsToggle');
      const closeSettingsBtn = document.getElementById('closeSettingsBtn');
      const bgUploadBtn = document.getElementById('bgUploadBtn');
      const speedBtn = document.getElementById('speedBtn');
      const modalOverlay = document.getElementById('modalOverlay');
      const modalDialog = document.getElementById('modalDialog');

      function formatTime() { return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }); }

      function updateUI() {
        partnerDisplayName.textContent = partnerName;
        partnerAvatarImg.src = partnerAvatar;
        document.getElementById('myAvatarPreview').src = myAvatar;
        document.getElementById('partnerAvatarPreview').src = partnerAvatar;
        chatBackground.style.backgroundImage = chatBgUrl ? `url(${chatBgUrl})` : '';
        saveData();
      }

      function showTypingIndicator() {
        if (isTyping) return;
        isTyping = true;
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message-row received';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
          <img class="msg-avatar" src="${partnerAvatar}">
          <div class="typing-indicator">
            <span>对方正在输入</span>
            <div class="typing-dots">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        `;
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function hideTypingIndicator() {
        isTyping = false;
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
      }

      function isShortText(text) {
        const chineseChars = (text.match(/[\u4e00-\u9fff]/g) || []).length;
        const otherChars = text.length - chineseChars;
        const estimatedWidth = chineseChars * 1 + otherChars * 0.5;
        return estimatedWidth <= 28;
      }

      function renderMessages() {
        const wasTyping = isTyping;
        chatMessages.innerHTML = messages.length === 0 && !wasTyping ? '<div style="text-align:center;color:#b39364;margin-top:40px;">✨ 私密对话</div>' : '';
        messages.forEach(msg => {
          const row = document.createElement('div');
          row.className = `message-row ${msg.sender === currentUser ? 'sent' : 'received'}`;
          row.innerHTML = `<img class="msg-avatar" src="${msg.sender===currentUser ? myAvatar : partnerAvatar}">`;
          const contentDiv = document.createElement('div');
          contentDiv.style.display = 'flex';
          contentDiv.style.flexDirection = 'column';
          contentDiv.style.alignItems = msg.sender === currentUser ? 'flex-end' : 'flex-start';
          
          if (msg.type.startsWith('sticker')) {
            contentDiv.innerHTML = `<div class="bubble sticker-bubble"><img class="sticker-img" src="${msg.text}"></div><span class="message-time">${msg.time}</span>`;
          } else {
            const singleLineClass = isShortText(msg.text) ? ' single-line' : '';
            contentDiv.innerHTML = `<div class="bubble${singleLineClass}">${msg.text}</div><span class="message-time">${msg.time}</span>`;
          }
          row.appendChild(contentDiv);
          chatMessages.appendChild(row);
        });
        if (wasTyping) showTypingIndicator();
        chatMessages.scrollTop = chatMessages.scrollHeight;
        saveData();
      }

      function addMessage(text, sender, type='text') {
        messages.push({ id: Date.now(), text, sender, time: formatTime(), type });
        renderMessages();
      }

      function getRandomReply() {
        const pool = [...textCards.map(t=>({type:'text',content:t})), ...stickerCards.map(s=>({type:'sticker',content:s})), ...stickerPackCards.map(p=>({type:'sticker_pack',content:p}))];
        return pool.length ? pool[Math.floor(Math.random()*pool.length)] : {type:'text',content:'...'};
      }

      function simulatePartnerReply() {
        showTypingIndicator();
        const rand = Math.random();
        let replyCount = 1;
        if (rand < 0.1) replyCount = 5;
        else if (rand < 0.2) replyCount = 3;
        else if (rand < 0.35) replyCount = 2;

        setTimeout(() => {
          hideTypingIndicator();
          const reply = getRandomReply();
          addMessage(reply.content, partnerUser, reply.type);
          for (let i = 1; i < replyCount; i++) {
            setTimeout(() => {
              const nextReply = getRandomReply();
              addMessage(nextReply.content, partnerUser, nextReply.type);
            }, replySpeed * i + Math.random() * 1000);
          }
        }, replySpeed + Math.random() * 2000);
      }

      function closeModal() { modalOverlay.classList.remove('active'); }

      function showSpeedModal() {
        modalDialog.innerHTML = `
          <div class="modal-header"><h3>回复速度设置</h3><button class="close-modal-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button></div>
          <div class="speed-slider-container">
            ${speedOptions.map(opt => `
              <div class="speed-option ${replySpeed === opt.value ? 'selected' : ''}" onclick="window.__setSpeed(${opt.value})">
                <div class="speed-radio"></div>
                <span>${opt.label}</span>
              </div>
            `).join('')}
          </div>
        `;
        modalOverlay.classList.add('active');
      }

      window.__setSpeed = (value) => { replySpeed = value; saveData(); showSpeedModal(); };

      function showEmojiModal() {
        modalDialog.innerHTML = `
          <div class="modal-header"><h3>选择表情</h3><button class="close-modal-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button></div>
          <div class="modal-body">
            ${[...stickerCards, ...stickerPackCards].map(src => `<div class="modal-item"><img src="${src}" onclick="window.__sendSticker('${src}')" style="cursor:pointer;"/></div>`).join('')}
            ${stickerCards.length===0 && stickerPackCards.length===0 ? '<p style="color:#b39364;">暂无表情</p>' : ''}
          </div>
          <div class="modal-footer"><button class="btn" id="uploadEmojiInModalBtn">上传新表情</button></div>
        `;
        modalOverlay.classList.add('active');
        document.getElementById('uploadEmojiInModalBtn').addEventListener('click', () => {
          const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
          inp.onchange = e => { if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>{ stickerCards.push(ev.target.result); updateUI(); showEmojiModal(); }; r.readAsDataURL(e.target.files[0]); }};
          inp.click();
        });
      }

      window.__sendSticker = (src) => { addMessage(src, currentUser, 'sticker'); closeModal(); simulatePartnerReply(); };

      function showAvatarModal(type) {
        const isMy = type === 'my';
        modalDialog.innerHTML = `
          <div class="modal-header"><h3>${isMy?'更换我的头像':'更换对方头像'}</h3><button class="close-modal-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button></div>
          <div class="modal-body" style="justify-content:center;"><img src="${isMy?myAvatar:partnerAvatar}" class="avatar-upload-preview" style="width:80px;height:80px;"></div>
          <div class="modal-footer"><button class="btn" id="uploadAvatarBtn">从相册选择</button></div>
        `;
        modalOverlay.classList.add('active');
        document.getElementById('uploadAvatarBtn').addEventListener('click', () => {
          const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
          inp.onchange = e => { if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>{ if(isMy) myAvatar=ev.target.result; else partnerAvatar=ev.target.result; updateUI(); renderMessages(); showAvatarModal(type); }; r.readAsDataURL(e.target.files[0]); }};
          inp.click();
        });
      }

      function showCardModal(type) {
        const titleMap = { text:'字卡管理', sticker:'表情管理', pack:'表情包管理' };
        const items = type==='text' ? textCards : (type==='sticker' ? stickerCards : stickerPackCards);
        modalDialog.innerHTML = `
          <div class="modal-header"><h3>${titleMap[type]}</h3><button class="close-modal-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button></div>
          <div class="modal-body">
            ${items.map((item,i) => type==='text' ? `<div class="modal-item"><span>${item}</span><button class="delete-item-btn" onclick="window.__delCard('${type}',${i})">×</button></div>` : `<div class="modal-item"><img src="${item}"><button class="delete-item-btn" onclick="window.__delCard('${type}',${i})">×</button></div>`).join('')}
            ${items.length===0 ? '<p style="color:#b39364;">暂无内容</p>' : ''}
          </div>
          <div class="modal-footer">
            ${type==='text' ? '<input id="cardTextInput" placeholder="输入文字">' : ''}
            <button class="btn" id="addCardBtn">${type==='text'?'添加文字':'上传图片'}</button>
          </div>
        `;
        modalOverlay.classList.add('active');
        document.getElementById('addCardBtn').addEventListener('click', () => {
          if(type==='text') { const v=document.getElementById('cardTextInput').value.trim(); if(v){ textCards.push(v); updateUI(); showCardModal(type); } }
          else { const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>{ if(type==='sticker') stickerCards.push(ev.target.result); else stickerPackCards.push(ev.target.result); updateUI(); showCardModal(type); }; r.readAsDataURL(e.target.files[0]); }}; inp.click(); }
        });
      }

      window.__delCard = (type, index) => {
        if(type==='text') textCards.splice(index,1);
        else if(type==='sticker') stickerCards.splice(index,1);
        else stickerPackCards.splice(index,1);
        updateUI(); showCardModal(type);
      };

      sendButton.addEventListener('click', ()=>{ if(messageInput.value.trim()){ addMessage(messageInput.value.trim(), currentUser); messageInput.value=''; simulatePartnerReply(); } });
      messageInput.addEventListener('keypress', e=>{ if(e.key==='Enter') sendButton.click(); });
      emojiToggleBtn.addEventListener('click', showEmojiModal);
      speedBtn.addEventListener('click', showSpeedModal);
      document.getElementById('partnerInfoClick').addEventListener('click', ()=>showAvatarModal('partner'));
      document.getElementById('myAvatarBtn').addEventListener('click', ()=>showAvatarModal('my'));
      document.getElementById('partnerAvatarBtn').addEventListener('click', ()=>showAvatarModal('partner'));
      settingsToggle.addEventListener('click', ()=>settingsOverlay.classList.add('active'));
      closeSettingsBtn.addEventListener('click', ()=>settingsOverlay.classList.remove('active'));
      bgUploadBtn.addEventListener('click', ()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>{ chatBgUrl=ev.target.result; updateUI(); }; r.readAsDataURL(e.target.files[0]); }}; inp.click(); });
      document.getElementById('saveNicknameBtn').addEventListener('click', ()=>{ const v=document.getElementById('nicknameInput').value.trim(); if(v){ partnerName=v; updateUI(); } });
      document.getElementById('editNicknameBtn').addEventListener('click', (e)=>{ e.stopPropagation(); document.getElementById('nicknameInput').value=partnerName; settingsOverlay.classList.add('active'); });
      document.getElementById('openTextCardsBtn').addEventListener('click', ()=>showCardModal('text'));
      document.getElementById('openStickerCardsBtn').addEventListener('click', ()=>showCardModal('sticker'));
      document.getElementById('openStickerPackCardsBtn').addEventListener('click', ()=>showCardModal('pack'));
      modalOverlay.addEventListener('click', (e)=>{ if(e.target===modalOverlay) closeModal(); });

      loadData();
      updateUI();
      renderMessages();
    })();
  </script>
</body>
</html>
